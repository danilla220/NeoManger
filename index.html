<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музыкальный Плеер</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .player-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 300px;
            text-align: center;
        }
        .track-list {
            list-style: none;
            padding: 0;
            margin-top: 20px;
            text-align: left;
        }
        .track-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }
        .track-item:hover {
            background-color: #f0f0f0;
        }
        audio {
            width: 100%;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="player-container">
    <h2>Мой Плеер</h2>
    <audio id="audio-player" controls></audio>
    <ul class="track-list" id="track-list">
        <!-- Треки будут добавлены через JavaScript -->
    </ul>
</div>

<script src="script.js"></script>
</body>
</html>
