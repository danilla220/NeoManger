<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messenger MVP</title>
  <style>
    :root { --bg: #121212; --surface: #1e1e1e; --text: #e0e0e0; --accent: #00bcd4; --border: #333; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
    body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
    .auth, .chat { display: flex; flex-direction: column; height: 100%; padding: 20px; max-width: 800px; margin: 0 auto; width: 100%; }
    .hidden { display: none !important; }
    input, button { padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--text); }
    button { background: var(--accent); border: none; cursor: pointer; font-weight: bold; }
    button:hover { opacity: 0.9; }
    .messages { flex: 1; overflow-y: auto; padding: 10px 0; display: flex; flex-direction: column; gap: 8px; }
    .msg { background: var(--surface); padding: 8px 12px; border-radius: 8px; max-width: 75%; word-break: break-word; }
    .msg .meta { font-size: 12px; color: #888; margin-bottom: 4px; }
    .input-area { display: flex; gap: 10px; margin-top: 10px; }
    .input-area input { flex: 1; }
    h2 { margin-bottom: 15px; color: var(--accent); }
    .tabs { display: flex; gap: 10px; margin-bottom: 10px; }
    .tab { background: var(--surface); flex: 1; padding: 8px; text-align: center; cursor: pointer; border-radius: 6px; }
    .tab.active { background: var(--accent); color: #000; }
  </style>
</head>
<body>
  <!-- Auth Screen -->
  <div id="authScreen" class="auth">
    <h2>Вход / Регистрация</h2>
    <div class="tabs">
      <div class="tab active" onclick="switchAuth('login')">Вход</div>
      <div class="tab" onclick="switchAuth('register')">Регистрация</div>
    </div>
    <input id="username" placeholder="Логин" required>
    <input id="password" type="password" placeholder="Пароль" required>
    <button id="authBtn" onclick="handleAuth()">Войти</button>
    <p id="authError" style="color: #ff5252; margin-top: 5px;"></p>
  </div>

  <!-- Chat Screen -->
  <div id="chatScreen" class="chat hidden">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
      <h2>Чат <span id="currentUser" style="font-size:14px; color:#888;"></span></h2>
      <button onclick="logout()" style="background:#ff5252; padding:5px 10px;">Выйти</button>
    </div>
    <div id="messages" class="messages"></div>
    <div class="input-area">
      <input id="msgInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
      <button onclick="sendMessage()">Отправить</button>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script>
    let socket = null;
    let currentUser = null;
    let authMode = 'login';

    function switchAuth(mode) {
      authMode = mode;
      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i === 0 && mode === 'login') || (i === 1 && mode === 'register')));
      document.getElementById('authBtn').textContent = mode === 'login' ? 'Войти' : 'Зарегистрироваться';
    }

    async function handleAuth() {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value.trim();
      const errEl = document.getElementById('authError');
      errEl.textContent = '';
      if (!u || !p) return errEl.textContent = 'Заполните поля';

      const url = authMode === 'login' ? '/api/login' : '/api/register';
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: u, password: p })
      });
      const data = await res.json();

      if (!res.ok) return errEl.textContent = data.error;

      if (authMode === 'login') {
        localStorage.setItem('token', data.token);
        localStorage.setItem('username', data.username);
        currentUser = data.username;
        document.getElementById('authScreen').classList.add('hidden');
        document.getElementById('chatScreen').classList.remove('hidden');
        document.getElementById('currentUser').textContent = `( ${currentUser} )`;
        initSocket();
        loadMessages();
      } else {
        errEl.style.color = '#4caf50';
        errEl.textContent = 'Регистрация успешна! Теперь войдите.';
        switchAuth('login');
      }
    }

    function initSocket() {
      const token = localStorage.getItem('token');
      socket = io('http://localhost:3000', { auth: { token } });
      socket.on('connect_error', (err) => {
        if (err.message === 'Invalid token') logout();
      });
      socket.on('new_message', (msg) => renderMessage(msg));
    }

    async function loadMessages() {
      const res = await fetch('/api/messages');
      const msgs = await res.json();
      document.getElementById('messages').innerHTML = '';
      msgs.forEach(renderMessage);
    }

    function renderMessage(msg) {
      const div = document.createElement('div');
      div.className = 'msg';
      div.innerHTML = `<div class="meta">${msg.username} • ${new Date(msg.created_at).toLocaleTimeString()}</div>${msg.content}`;
      const container = document.getElementById('messages');
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function sendMessage() {
      const input = document.getElementById('msgInput');
      const text = input.value.trim();
      if (!text || !socket) return;
      socket.emit('send_message', text);
      input.value = '';
    }

    function logout() {
      localStorage.clear();
      location.reload();
    }

    // Auto-login if token exists
    if (localStorage.getItem('token')) {
      currentUser = localStorage.getItem('username');
      document.getElementById('authScreen').classList.add('hidden');
      document.getElementById('chatScreen').classList.remove('hidden');
      document.getElementById('currentUser').textContent = `( ${currentUser} )`;
      initSocket();
      loadMessages();
    }
  </script>
</body>
</html>
