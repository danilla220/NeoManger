<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoMusic — Realtime</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --text: #f4f4f5;
            --text-dim: #a1a1aa;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background Effects */
        .glow {
            position: fixed; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, rgba(0,0,0,0) 70%);
            top: -100px; left: -100px; z-index: -1; pointer-events: none;
        }
        
        /* Layout */
        .app-container { max-width: 1000px; margin: 0 auto; padding-bottom: 100px; }
        
        /* Navbar */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; position: sticky; top: 0; z-index: 50;
            background: rgba(9, 9, 11, 0.8); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }
        .brand { font-weight: 800; font-size: 20px; letter-spacing: -0.5px; cursor: pointer; }
        .brand span { color: var(--accent); }

        .btn {
            padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--glass); color: var(--text); cursor: pointer;
            font-size: 13px; font-weight: 500; transition: 0.2s;
        }
        .btn:hover { background: rgba(255,255,255,0.08); }
        .btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-danger { color: var(--danger); border-color: rgba(239,68,68,0.2); }
        .btn-danger:hover { background: rgba(239,68,68,0.1); }

        /* Main */
        .content { padding: 20px; }
        .hero { text-align: center; margin: 40px 0; }
        .hero h1 { font-size: 36px; margin-bottom: 10px; }
        .hero p { color: var(--text-dim); }

        /* Track List */
        .track-list { display: flex; flex-direction: column; gap: 8px; }
        .track-item {
            display: flex; align-items: center; gap: 15px;
            padding: 10px; border-radius: 10px;
            background: transparent; border: 1px solid transparent;
            transition: 0.2s; cursor: pointer;
        }
        .track-item:hover { background: var(--glass); border-color: var(--border); }
        .track-item.active { background: rgba(99,102,241,0.1); border-color: rgba(99,102,241,0.3); }

        .t-cover {
            width: 48px; height: 48px; border-radius: 6px; background: #27272a;
            display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0;
        }
        .t-cover img { width: 100%; height: 100%; object-fit: cover; }
        
        .t-info { flex: 1; min-width: 0; }
        .t-title { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .t-artist { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

        .t-actions { display: flex; gap: 5px; opacity: 0; transition: 0.2s; }
        .track-item:hover .t-actions { opacity: 1; }
        .icon-btn {
            width: 32px; height: 32px; border-radius: 6px; border: none;
            background: transparent; color: var(--text-dim); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .icon-btn:hover { background: rgba(255,255,255,0.1); color: white; }
        .icon-btn.liked { color: var(--danger); opacity: 1; }

        /* Player */
        .player {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 80px; background: #0f0f12; border-top: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 20px;
            transform: translateY(100%); transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
        }
        .player.open { transform: translateY(0); }
        
        .p-track { display: flex; align-items: center; gap: 12px; width: 30%; }
        .p-controls { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .p-btns { display: flex; align-items: center; gap: 15px; }
        .play-circle {
            width: 36px; height: 36px; border-radius: 50%; background: white; color: black;
            border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        
        .progress-wrap { width: 100%; max-width: 400px; display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-dim); font-family: monospace; }
        .progress-bg { flex: 1; height: 4px; background: #27272a; border-radius: 2px; cursor: pointer; position: relative; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; border-radius: 2px; pointer-events: none; }

        /* Modals */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            z-index: 200; display: none; align-items: center; justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: #18181b; border: 1px solid var(--border); padding: 24px;
            border-radius: 16px; width: 90%; max-width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }
        .modal h2 { margin-bottom: 20px; font-size: 20px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .input {
            width: 100%; padding: 10px; background: #27272a; border: 1px solid transparent;
            border-radius: 8px; color: white; font-family: inherit; transition: 0.2s;
        }
        .input:focus { border-color: var(--accent); background: #000; }

        /* Toast */
        .toast {
            position: fixed; top: 20px; right: 20px; padding: 12px 20px;
            background: #27272a; border-left: 4px solid var(--accent);
            border-radius: 6px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5);
            transform: translateX(150%); transition: 0.3s; z-index: 300; font-size: 14px;
        }
        .toast.visible { transform: translateX(0); }
        .toast.error { border-color: var(--danger); }

        /* Loading */
        .loader { text-align: center; padding: 40px; color: var(--text-dim); font-size: 14px; }
    </style>
</head>
<body>

<div class="glow"></div>

<nav>
    <div class="brand" onclick="app.goHome()">Neo<span>Music</span></div>
    <div id="navActions"><button class="btn" disabled>Загрузка...</button></div>
</nav>

<div class="app-container">
    <div class="content">
        <div class="hero">
            <h1>Твоя музыка</h1>
            <p>Realtime Database & Glassmorphism</p>
        </div>

        <div style="display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap;">
            <button class="btn btn-primary" id="btnAdd" onclick="app.openTrackModal()" style="display:none">+ Добавить трек</button>
            <button class="btn" id="btnFav" onclick="app.toggleFavFilter()">❤️ Избранное</button>
            <button class="btn" onclick="app.openProfile()">⚙️ Профиль</button>
        </div>

        <div id="trackContainer" class="track-list">
            <div class="loader">Загрузка треков...</div>
        </div>
    </div>
</div>

<div class="player" id="playerBar">
    <div class="p-track">
        <div class="t-cover" id="pCover">🎵</div>
        <div style="min-width:0">
            <div class="t-title" id="pTitle">Название</div>
            <div class="t-artist" id="pArtist">Исполнитель</div>
        </div>
    </div>
    <div class="p-controls">
        <div class="p-btns">
            <button class="icon-btn" onclick="player.prev()">⏮</button>
            <button class="play-circle" onclick="player.toggle()">▶</button>
            <button class="icon-btn" onclick="player.next()">⏭</button>
        </div>
        <div class="progress-wrap">
            <span id="pTimeCur">0:00</span>
            <div class="progress-bg" id="pBar" onclick="player.seek(event)">
                <div class="progress-fill" id="pFill"></div>
            </div>
            <span id="pTimeTot">0:00</span>
        </div>
    </div>
    <div style="width:30%"></div>
</div>

<!-- Auth Modal -->
<div class="modal-overlay" id="mAuth">
    <div class="modal">
        <h2 id="authTitle">Вход</h2>
        <form onsubmit="app.handleAuth(event)">
            <div class="form-group"><label>Email</label><input type="email" class="input" id="authEmail" required></div>
            <div class="form-group"><label>Пароль</label><input type="password" class="input" id="authPass" required></div>
            <div class="form-group" id="regNameBox" style="display:none"><label>Имя</label><input type="text" class="input" id="authName"></div>
            <button type="submit" class="btn btn-primary" style="width:100%" id="authBtn">Войти</button>
        </form>
        <button class="btn" style="width:100%; margin-top:10px" onclick="app.toggleAuthMode()">Сменить режим</button>
        <button class="btn" style="width:100%; margin-top:5px; border:none; color:var(--text-dim)" onclick="app.closeModals()">Закрыть</button>
    </div>
</div>

<!-- Track Modal -->
<div class="modal-overlay" id="mTrack">
    <div class="modal">
        <h2 id="trackTitle">Добавить трек</h2>
        <form onsubmit="app.saveTrack(event)">
            <input type="hidden" id="trId">
            <div class="form-group"><label>Название</label><input type="text" class="input" id="trName" required></div>
            <div class="form-group"><label>Автор</label><input type="text" class="input" id="trArtist" required></div>
            <div class="form-group"><label>Ссылка (MP3)</label><input type="url" class="input" id="trUrl" required placeholder="Прямая ссылка или Dropbox"></div>
            <div class="form-group"><label>Обложка (URL)</label><input type="url" class="input" id="trCover" placeholder="https://..."></div>
            <button type="submit" class="btn btn-primary" style="width:100%">Сохранить</button>
        </form>
        <button class="btn" style="width:100%; margin-top:10px; border:none; color:var(--text-dim)" onclick="app.closeModals()">Отмена</button>
    </div>
</div>

<!-- Profile Modal -->
<div class="modal-overlay" id="mProfile">
    <div class="modal">
        <h2>Профиль</h2>
        <form onsubmit="app.updateProfile(event)">
            <div class="form-group"><label>Имя</label><input type="text" class="input" id="profName" required></div>
            <div class="form-group"><label>Новый пароль (мин. 6 симв.)</label><input type="password" class="input" id="profPass" placeholder="Оставьте пустым"></div>
            <button type="submit" class="btn btn-primary" style="width:100%">Обновить</button>
        </form>
        <button class="btn btn-danger" style="width:100%; margin-top:10px" onclick="app.logout()">Выйти из аккаунта</button>
        <button class="btn" style="width:100%; margin-top:5px; border:none; color:var(--text-dim)" onclick="app.closeModals()">Закрыть</button>
    </div>
</div>

<div class="toast" id="toast"></div>
<audio id="audio"></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile, updatePassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, push, onValue, remove, update, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // CONFIG
    const firebaseConfig = {
      apiKey: "AIzaSyB8mjdLIu-do2hFViKLxDUKYoYTXgMmvZU",
      authDomain: "neofast-637fe.firebaseapp.com",
      databaseURL: "https://neofast-637fe-default-rtdb.firebaseio.com",
      projectId: "neofast-637fe",
      storageBucket: "neofast-637fe.firebasestorage.app",
      messagingSenderId: "820501532062",
      appId: "1:820501532062:web:742d4407f82027fb041a8f"
    };

    const app_firebase = initializeApp(firebaseConfig);
    const auth = getAuth(app_firebase);
    const db = getDatabase(app_firebase);

    // STATE
    let user = null;
    let tracks = [];
    let favorites = {}; // Map: { trackId: true }
    let showFavOnly = false;
    let isLogin = true;

    // DOM
    const $ = (id) => document.getElementById(id);
    
    // --- AUTH ---
    onAuthStateChanged(auth, async (u) => {
        user = u;
        if (user) {
            $('navActions').innerHTML = `
                <span style="font-size:13px; margin-right:10px; color:var(--text-dim)">${user.displayName || 'User'}</span>
                <button class="btn btn-primary" onclick="app.openTrackModal()">+ Трек</button>
            `;
            $('btnAdd').style.display = 'inline-block';
            
            // Load Favorites
            const snap = await get(child(ref(db), `users/${user.uid}/favorites`));
            favorites = snap.val() || {};
        } else {
            $('navActions').innerHTML = `<button class="btn btn-primary" onclick="app.openAuth()">Войти</button>`;
            $('btnAdd').style.display = 'none';
            favorites = {};
        }
        render();
    });

    window.handleAuthLogic = async (e) => {
        e.preventDefault();
        const email = $('authEmail').value;
        const pass = $('authPass').value;
        const name = $('authName').value;

        try {
            if (isLogin) {
                await signInWithEmailAndPassword(auth, email, pass);
            } else {
                const cred = await createUserWithEmailAndPassword(auth, email, pass);
                await updateProfile(cred.user, { displayName: name || email.split('@')[0] });
                // Init user DB
                await set(ref(db, 'users/' + cred.user.uid), {
                    email: email,
                    name: name || email.split('@')[0],
                    createdAt: Date.now()
                });
            }
            app.closeModals();
            toast('Успешно!');
        } catch (err) {
            toast(err.message, 1);
        }
    };

    window.logout = () => signOut(auth);

    // --- TRACKS DB ---
    const tracksRef = ref(db, 'tracks');
    onValue(tracksRef, (snapshot) => {
        const data = snapshot.val();
        tracks = [];
        if (data) {
            Object.keys(data).forEach(key => {
                tracks.push({ id: key, ...data[key] });
            });
        }
        // Sort by new
        tracks.sort((a,b) => b.createdAt - a.createdAt);
        render();
    });

    window.saveTrackLogic = async (e) => {
        e.preventDefault();
        if (!user) return toast('Нужен вход', 1);

        const id = $('trId').value;
        const data = {
            title: $('trName').value,
            artist: $('trArtist').value,
            url: $('trUrl').value,
            cover: $('trCover').value,
            uid: user.uid,
            updatedAt: Date.now()
        };

        try {
            if (id) {
                // Edit check
                const t = tracks.find(x => x.id === id);
                if (t.uid !== user.uid) throw new Error("Чужой трек");
                await update(ref(db, `tracks/${id}`), data);
                toast('Обновлено');
            } else {
                data.createdAt = Date.now();
                await push(tracksRef, data);
                toast('Добавлено');
            }
            app.closeModals();
        } catch (err) {
            toast(err.message, 1);
        }
    };

    window.deleteTrackLogic = async (id) => {
        if (!confirm('Удалить?')) return;
        const t = tracks.find(x => x.id === id);
        if (t.uid !== user.uid) return toast('Нельзя удалить чужое', 1);
        
        await remove(ref(db, `tracks/${id}`));
        toast('Удалено');
    };

    window.toggleLike = async (id) => {
        if (!user) return app.openAuth();
        const path = `users/${user.uid}/favorites/${id}`;
        if (favorites[id]) {
            await update(ref(db), { [path]: null });
            delete favorites[id];
        } else {
            await update(ref(db), { [path]: true });
            favorites[id] = true;
        }
        render(); // Re-render to update heart icon
    };

    window.updateProfileLogic = async (e) => {
        e.preventDefault();
        const name = $('profName').value;
        const pass = $('profPass').value;
        
        try {
            await updateProfile(user, { displayName: name });
            await update(ref(db, `users/${user.uid}`), { name });
            if (pass.length >= 6) await updatePassword(user, pass);
            toast('Профиль сохранен');
            app.closeModals();
        } catch(err) { toast(err.message, 1); }
    };

    // --- RENDER ---
    function render() {
        const list = $('trackContainer');
        let filtered = tracks;
        if (showFavOnly) {
            filtered = tracks.filter(t => favorites[t.id]);
        }

        if (filtered.length === 0) {
            list.innerHTML = `<div class="loader">${showFavOnly ? 'Нет избранных треков' : 'Список пуст'}</div>`;
            return;
        }

        list.innerHTML = filtered.map(t => {
            const isOwner = user && t.uid === user.uid;
            const isLiked = favorites[t.id];
            const active = player.current?.id === t.id ? 'active' : '';
            
            return `
            <div class="track-item ${active}" onclick="player.play('${t.id}')">
                <div class="t-cover">
                    ${t.cover ? `<img src="${t.cover}" onerror="this.style.display='none';this.parentElement.innerText='🎵'">` : '🎵'}
                </div>
                <div class="t-info">
                    <div class="t-title">${esc(t.title)}</div>
                    <div class="t-artist">${esc(t.artist)}</div>
                </div>
                <div class="t-actions">
                    <button class="icon-btn ${isLiked ? 'liked' : ''}" onclick="event.stopPropagation(); toggleLike('${t.id}')">♥</button>
                    ${isOwner ? `
                        <button class="icon-btn" onclick="event.stopPropagation(); app.editTrack('${t.id}')">✎</button>
                        <button class="icon-btn" style="color:var(--danger)" onclick="event.stopPropagation(); deleteTrackLogic('${t.id}')">✕</button>
                    ` : ''}
                </div>
            </div>`;
        }).join('');
    }

    // --- PLAYER ---
    const audio = $('audio');
    const player = {
        current: null,
        play: (id) => {
            const t = tracks.find(x => x.id === id);
            if (!t) return;

            if (player.current?.id === id) {
                player.toggle();
                return;
            }

            // Link Processing
            let url = t.url;
            if (url.includes('drive.google.com')) {
                const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
                if(m) url = `https://drive.google.com/uc?export=download&id=${m[1]}`;
            } else if (url.includes('dropbox.com')) {
                url = url.replace('dl=0','raw=1').replace('www.dropbox.com','dl.dropboxusercontent.com');
            }

            player.current = t;
            audio.src = url;
            audio.play().then(() => {
                player.updateUI(true);
                render();
            }).catch(e => {
                console.error(e);
                toast('Ошибка воспроизведения (CORS или битая ссылка)', 1);
            });
        },
        toggle: () => {
            if (!player.current) return;
            if (audio.paused) { audio.play(); player.updateUI(true); }
            else { audio.pause(); player.updateUI(false); }
        },
        next: () => {
            const idx = tracks.findIndex(x => x.id === player.current?.id);
            if (idx > -1 && idx < tracks.length - 1) player.play(tracks[idx+1].id);
        },
        prev: () => {
            const idx = tracks.findIndex(x => x.id === player.current?.id);
            if (idx > 0) player.play(tracks[idx-1].id);
        },
        seek: (e) => {
            const w = e.currentTarget.offsetWidth;
            const x = e.offsetX;
            audio.currentTime = (x / w) * audio.duration;
        },
        updateUI: (playing) => {
            $('playerBar').classList.add('open');
            $('pTitle').innerText = player.current.title;
            $('pArtist').innerText = player.current.artist;
            $('pCover').innerHTML = player.current.cover ? `<img src="${player.current.cover}">` : '🎵';
            $('play-circle').innerHTML = playing ? '⏸' : '▶';
        }
    };

    audio.addEventListener('timeupdate', () => {
        const p = (audio.currentTime / audio.duration) * 100;
        $('pFill').style.width = `${p||0}%`;
        $('pTimeCur').innerText = fmt(audio.currentTime);
        $('pTimeTot').innerText = fmt(audio.duration);
    });
    audio.addEventListener('ended', () => player.next());

    // --- UTILS ---
    function fmt(s) {
        if(isNaN(s)) return "0:00";
        const m = Math.floor(s/60);
        const sec = Math.floor(s%60);
        return `${m}:${sec<10?'0'+sec:sec}`;
    }
    function esc(s) { return s ? s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c])) : ''; }
    function toast(msg, err) {
        const t = $('toast');
        t.innerText = msg;
        t.className = err ? 'toast error visible' : 'toast visible';
        setTimeout(() => t.classList.remove('visible'), 3000);
    }

    // --- APP EXPOSED ---
    window.app = {
        goHome: () => { showFavOnly=false; render(); },
        openAuth: () => $('mAuth').classList.add('show'),
        openTrackModal: () => {
            $('trId').value = ''; $('trName').value = ''; $('trArtist').value = ''; $('trUrl').value = ''; $('trCover').value = '';
            $('trackTitle').innerText = 'Добавить трек';
            $('mTrack').classList.add('show');
        },
        editTrack: (id) => {
            const t = tracks.find(x => x.id === id);
            $('trId').value = t.id; $('trName').value = t.title; $('trArtist').value = t.artist;
            $('trUrl').value = t.url; $('trCover').value = t.cover || '';
            $('trackTitle').innerText = 'Редактировать';
            $('mTrack').classList.add('show');
        },
        openProfile: () => {
            if(!user) return app.openAuth();
            $('profName').value = user.displayName || '';
            $('profPass').value = '';
            $('mProfile').classList.add('show');
        },
        closeModals: () => document.querySelectorAll('.modal-overlay').forEach(el => el.classList.remove('show')),
        toggleAuthMode: () => {
            isLogin = !isLogin;
            $('authTitle').innerText = isLogin ? 'Вход' : 'Регистрация';
            $('authBtn').innerText = isLogin ? 'Войти' : 'Создать';
            $('regNameBox').style.display = isLogin ? 'none' : 'block';
        },
        toggleFavFilter: () => {
            if(!user) return toast('Войдите сначала', 1);
            showFavOnly = !showFavOnly;
            $('btnFav').style.background = showFavOnly ? 'rgba(239,68,68,0.2)' : '';
            render();
        },
        handleAuth: window.handleAuthLogic,

    };
