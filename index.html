<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoMusic — Cloud Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ============ CSS STYLES (Dark + Glass) ============ */
        :root {
            --bg-primary: #0a0a0f;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #6c5ce7;
            --accent-glow: rgba(108, 92, 231, 0.4);
            --text-main: #ffffff;
            --text-sec: rgba(255, 255, 255, 0.6);
            --danger: #ff4757;
            --success: #2ed573;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background Animation */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.4;
            animation: float 20s infinite ease-in-out;
        }
        .orb-1 { width: 400px; height: 400px; bg: var(--accent); top: -100px; left: -100px; background: var(--accent); }
        .orb-2 { width: 300px; height: 300px; bottom: -50px; right: -50px; background: #fd79a8; animation-delay: -5s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 50px); }
        }

        /* Layout */
        .app { max-width: 1200px; margin: 0 auto; padding-bottom: 100px; }
        
        /* Navbar */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px;
            position: sticky; top: 0; z-index: 100;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }
        .logo { font-size: 24px; font-weight: 800; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }
        
        .nav-btn {
            padding: 8px 16px; border-radius: 20px; border: 1px solid var(--glass-border);
            background: var(--glass-bg); color: white; cursor: pointer; transition: 0.2s;
            font-size: 14px; margin-left: 10px;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.1); }
        .nav-btn.primary { background: var(--accent); border-color: var(--accent); }
        .nav-btn.primary:hover { box-shadow: 0 0 15px var(--accent-glow); }

        /* Content */
        .container { padding: 20px; }
        
        .hero { text-align: center; padding: 40px 0; }
        .hero h1 { font-size: 48px; margin-bottom: 10px; }
        .hero p { color: var(--text-sec); }

        /* Track List */
        .track-list { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        
        .track-card {
            display: flex; align-items: center; gap: 15px;
            padding: 12px;
            background: var(--glass-bg);
            border: 1px solid transparent;
            border-radius: 12px;
            transition: 0.2s;
        }
        .track-card:hover { border-color: var(--glass-border); background: rgba(255,255,255,0.05); }
        .track-card.playing { border-color: var(--accent); background: rgba(108, 92, 231, 0.1); }

        .cover {
            width: 50px; height: 50px; border-radius: 8px; background: #222;
            display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0;
        }
        .cover img { width: 100%; height: 100%; object-fit: cover; }
        
        .info { flex: 1; min-width: 0; }
        .t-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .t-artist { font-size: 13px; color: var(--text-sec); }

        .actions { display: flex; gap: 8px; opacity: 0; transition: 0.2s; }
        .track-card:hover .actions { opacity: 1; }
        
        .icon-btn {
            width: 32px; height: 32px; border-radius: 50%; border: none;
            background: transparent; color: var(--text-sec); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .icon-btn:hover { background: rgba(255,255,255,0.1); color: white; }
        .icon-btn.active { color: var(--danger); }
        .icon-btn.edit:hover { color: var(--accent); }

        /* Player Bar */
        .player-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 80px; background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(30px);
            border-top: 1px solid var(--glass-border);
            display: flex; align-items: center; padding: 0 20px;
            transform: translateY(100%); transition: 0.3s;
            z-index: 200;
        }
        .player-bar.visible { transform: translateY(0); }
        
        .p-info { display: flex; align-items: center; gap: 15px; width: 300px; }
        .p-controls { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .p-btns { display: flex; gap: 20px; align-items: center; }
        .play-btn { 
            width: 40px; height: 40px; background: white; color: black; 
            border-radius: 50%; border: none; cursor: pointer; 
            display: flex; align-items: center; justify-content: center;
        }
        
        .progress-container { width: 100%; max-width: 500px; display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text-sec); }
        .progress-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; cursor: pointer; position: relative; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; border-radius: 2px; }

        /* Modals */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px);
            z-index: 1000; display: none; align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        
        .modal {
            background: #16161e; border: 1px solid var(--glass-border);
            padding: 30px; border-radius: 20px; width: 90%; max-width: 450px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .modal h2 { margin-bottom: 20px; }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; color: var(--text-sec); margin-bottom: 5px; text-transform: uppercase; }
        .inp {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border); border-radius: 8px; color: white;
        }
        .inp:focus { border-color: var(--accent); }

        .btn-full { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: transparent; border: 1px solid var(--glass-border); color: white; margin-top: 10px; }

        /* Toast */
        .toast {
            position: fixed; top: 20px; right: 20px; padding: 15px 25px;
            background: #222; border-left: 4px solid var(--accent);
            border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transform: translateX(120%); transition: 0.3s; z-index: 2000;
        }
        .toast.show { transform: translateX(0); }
    </style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<!-- Navbar -->
<nav>
    <div class="logo" onclick="app.renderTracks()">NeoMusic</div>
    <div id="navAuth">
        <!-- JS will inject buttons here -->
        <span style="color:var(--text-sec)">Загрузка...</span>
    </div>
</nav>

<!-- Main Content -->
<div class="app">
    <div class="container">
        <div class="hero">
            <h1>Твоя музыка.<br><span style="color:var(--accent)">Везде.</span></h1>
            <p>База данных, избранное и редактор профиля.</p>
        </div>

        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <button class="nav-btn primary" onclick="app.openAddModal()" id="btnAddTrack" style="display:none">+ Добавить трек</button>
            <button class="nav-btn" onclick="app.toggleFavoritesMode()" id="btnFavMode">❤️ Избранное</button>
        </div>

        <div class="track-list" id="trackList">
            <!-- Tracks injected here -->
        </div>
    </div>
</div>

<!-- Player -->
<div class="player-bar" id="playerBar">
    <div class="p-info">
        <div class="cover" id="pCover"><span>🎵</span></div>
        <div>
            <div class="t-name" id="pName">Track Name</div>
            <div class="t-artist" id="pArtist">Artist</div>
        </div>
    </div>
    <div class="p-controls">
        <div class="p-btns">
            <button class="icon-btn" onclick="player.prev()">⏮</button>
            <button class="play-btn" onclick="player.togglePlay()" id="pBtn">▶</button>
            <button class="icon-btn" onclick="player.next()">⏭</button>
        </div>
        <div class="progress-container">
            <span id="pCurTime">0:00</span>
            <div class="progress-bar" id="pBar" onclick="player.seek(event)">
                <div class="progress-fill" id="pFill"></div>
            </div>
            <span id="pDurTime">0:00</span>
        </div>
    </div>
    <div style="width: 300px;"></div> <!-- Spacer for balance -->
</div>

<!-- Auth Modal -->
<div class="modal-overlay" id="modalAuth">
    <div class="modal">
        <h2 id="authTitle">Вход</h2>
        <form id="authForm">
            <div class="input-group">
                <label>Email</label>
                <input type="email" class="inp" id="authEmail" required>
            </div>
            <div class="input-group">
                <label>Пароль</label>
                <input type="password" class="inp" id="authPass" required>
            </div>
            <div class="input-group" id="regNameGroup" style="display:none">
                <label>Имя отображения</label>
                <input type="text" class="inp" id="authName">
            </div>
            <button type="submit" class="btn-full btn-primary" id="authSubmitBtn">Войти</button>
        </form>
        <button class="btn-full btn-secondary" onclick="app.toggleAuthMode()" id="authSwitchBtn">Нет аккаунта? Регистрация</button>
        <button class="btn-full btn-secondary" style="border:none; color:var(--text-sec)" onclick="app.closeModals()">Отмена</button>
    </div>
</div>

<!-- Add/Edit Track Modal -->
<div class="modal-overlay" id="modalTrack">
    <div class="modal">
        <h2 id="trackModalTitle">Добавить трек</h2>
        <form id="trackForm">
            <input type="hidden" id="trackId">
            <div class="input-group">
                <label>Название</label>
                <input type="text" class="inp" id="tName" required>
            </div>
            <div class="input-group">
                <label>Исполнитель</label>
                <input type="text" class="inp" id="tArtist" required>
            </div>
            <div class="input-group">
                <label>Ссылка на аудио (Google Drive, Dropbox, GitHub)</label>
                <input type="url" class="inp" id="tUrl" required placeholder="https://...">
                <small style="color:var(--text-sec); font-size:10px;">Dropbox: замените dl=0 на raw=1. GitHub: используйте Raw ссылку.</small>
            </div>
            <div class="input-group">
                <label>Ссылка на обложку (необязательно)</label>
                <input type="url" class="inp" id="tCover" placeholder="https://...">
            </div>
            <button type="submit" class="btn-full btn-primary">Сохранить</button>
        </form>
        <button class="btn-full btn-secondary" onclick="app.closeModals()">Отмена</button>
    </div>
</div>

<!-- Profile Edit Modal -->
<div class="modal-overlay" id="modalProfile">
    <div class="modal">
        <h2>Редактор профиля</h2>
        <form id="profileForm">
            <div class="input-group">
                <label>Ваше имя</label>
                <input type="text" class="inp" id="profName" required>
            </div>
            <div class="input-group">
                <label>Новый пароль (оставьте пустым, чтобы не менять)</label>
                <input type="password" class="inp" id="profPass">
            </div>
            <button type="submit" class="btn-full btn-primary">Обновить профиль</button>
        </form>
        <button class="btn-full btn-secondary" onclick="app.closeModals()">Отмена</button>
    </div>
</div>

<div class="toast" id="toast">Message</div>
<audio id="audioEl"></audio>

<!-- FIREBASE SDK -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile, updatePassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc, arrayUnion, arrayRemove, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // ================= CONFIGURATION =================
    // !!! ВСТАВЬТЕ СЮДА ВАШИ ДАННЫЕ ИЗ FIREBASE CONSOLE !!!
    const firebaseConfig = {
        apiKey: "AIzaSyBGlkE1Jhy1GqpsoxpIaMPzgf002PRGSXg",
        authDomain: "neomusic-48585.firebaseapp.com",
        projectId: "neomusic-48585",
        storageBucket: "neomusic-48585.firebasestorage.app",
        messagingSenderId: "489716980803",
        appId: "1:489716980803:web:5c8652d255048cad2208f6"
    };
    // =================================================

    // Init Firebase
    const fbApp = initializeApp(firebaseConfig);
    const auth = getAuth(fbApp);
    const db = getFirestore(fbApp);

    // State
    let currentUser = null;
    let allTracks = [];
    let favorites = [];
    let isFavMode = false;
    let isLoginMode = true;

    // DOM Elements
    const ui = {
        navAuth: document.getElementById('navAuth'),
        trackList: document.getElementById('trackList'),
        playerBar: document.getElementById('playerBar'),
        toast: document.getElementById('toast'),
        modals: {
            auth: document.getElementById('modalAuth'),
            track: document.getElementById('modalTrack'),
            profile: document.getElementById('modalProfile')
        }
    };

    // --- AUTH LOGIC ---
    onAuthStateChanged(auth, async (user) => {
        currentUser = user;
        if (user) {
            // Fetch User Data (Name & Favorites)
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists()) {
                const data = userDoc.data();
                favorites = data.favorites || [];
                // Update name if not set in Auth profile
                if (!user.displayName && data.name) {
                    updateProfile(user, { displayName: data.name });
                }
            } else {
                // Create user doc if new
                await setDoc(doc(db, "users", user.uid), {
                    name: user.email.split('@')[0],
                    email: user.email,
                    favorites: []
                });
            }
            renderNav();
            renderTracks();
        } else {
            favorites = [];
            renderNav();
            renderTracks();
        }
    });

    window.handleAuth = async (e) => {
        e.preventDefault();
        const email = document.getElementById('authEmail').value;
        const pass = document.getElementById('authPass').value;
        const name = document.getElementById('authName').value;

        try {
            if (isLoginMode) {
                await signInWithEmailAndPassword(auth, email, pass);
                showToast('Успешный вход!');
            } else {
                const cred = await createUserWithEmailAndPassword(auth, email, pass);
                await setDoc(doc(db, "users", cred.user.uid), {
                    name: name || email.split('@')[0],
                    email: email,
                    favorites: []
                });
                await updateProfile(cred.user, { displayName: name || email.split('@')[0] });
                showToast('Аккаунт создан!');
            }
            closeModals();
        } catch (err) {
            showToast('Ошибка: ' + err.message, true);
        }
    };

    window.logout = () => signOut(auth);

    window.toggleAuthMode = () => {
        isLoginMode = !isLoginMode;
        document.getElementById('authTitle').innerText = isLoginMode ? 'Вход' : 'Регистрация';
        document.getElementById('authSubmitBtn').innerText = isLoginMode ? 'Войти' : 'Создать аккаунт';
        document.getElementById('authSwitchBtn').innerText = isLoginMode ? 'Нет аккаунта? Регистрация' : 'Есть аккаунт? Вход';
        document.getElementById('regNameGroup').style.display = isLoginMode ? 'none' : 'block';
    };

    // --- PROFILE LOGIC ---
    window.openProfile = () => {
        if(!currentUser) return;
        document.getElementById('profName').value = currentUser.displayName || '';
        document.getElementById('profPass').value = '';
        ui.modals.profile.classList.add('open');
    };

    window.handleProfileUpdate = async (e) => {
        e.preventDefault();
        const newName = document.getElementById('profName').value;
        const newPass = document.getElementById('profPass').value;

        try {
            await updateProfile(currentUser, { displayName: newName });
            await updateDoc(doc(db, "users", currentUser.uid), { name: newName });
            
            if (newPass.length >= 6) {
                await updatePassword(currentUser, newPass);
            }
            showToast('Профиль обновлен');
            closeModals();
            renderNav();
        } catch (err) {
            showToast('Ошибка: ' + err.message, true);
        }
    };

    // --- TRACKS LOGIC (DB) ---
    // Listen to tracks real-time
    const q = query(collection(db, "tracks"), orderBy("createdAt", "desc"));
    onSnapshot(q, (snapshot) => {
        allTracks = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderTracks();
    });

    window.handleTrackSubmit = async (e) => {
        e.preventDefault();
        if (!currentUser) return showToast('Нужно войти!', true);

        const id = document.getElementById('trackId').value;
        const data = {
            name: document.getElementById('tName').value,
            artist: document.getElementById('tArtist').value,
            url: document.getElementById('tUrl').value,
            cover: document.getElementById('tCover').value || null,
            uid: currentUser.uid // Owner
        };

        try {
            if (id) {
                // Edit
                const trackRef = doc(db, "tracks", id);
                // Check ownership
                const t = allTracks.find(x => x.id === id);
                if(t.uid !== currentUser.uid) throw new Error("Не ваш трек");
                
                await updateDoc(trackRef, data);
                showToast('Трек обновлен');
            } else {
                // Add
                data.createdAt = Date.now();
                await addDoc(collection(db, "tracks"), data);
                showToast('Трек добавлен');
            }
            closeModals();
        } catch (err) {
            showToast('Ошибка: ' + err.message, true);
        }
    };

    window.deleteTrack = async (id) => {
        if (!confirm('Удалить трек?')) return;
        const t = allTracks.find(x => x.id === id);
        if (t.uid !== currentUser.uid) return showToast('Это не ваш трек', true);

        try {
            await deleteDoc(doc(db, "tracks", id));
            showToast('Трек удален');
        } catch (err) {
            showToast('Ошибка удаления', true);
        }
    };

    // --- FAVORITES LOGIC ---
    window.toggleFav = async (id) => {
        if (!currentUser) return showToast('Войдите, чтобы добавлять в избранное', true);
        
        const userRef = doc(db, "users", currentUser.uid);
        const isFav = favorites.includes(id);

        try {
            if (isFav) {
                await updateDoc(userRef, { favorites: arrayRemove(id) });
            } else {
                await updateDoc(userRef, { favorites: arrayUnion(id) });
            }
        } catch (err) {
            showToast('Ошибка обновления избранного', true);
        }
    };

    window.toggleFavoritesMode = () => {
        if (!currentUser) return showToast('Войдите для доступа', true);
        isFavMode = !isFavMode;
        document.getElementById('btnFavMode').style.background = isFavMode ? 'rgba(255,71,87,0.2)' : '';
        document.getElementById('btnFavMode').style.color = isFavMode ? '#ff4757' : '';
        renderTracks();
    };

    // --- RENDER UI ---
    function renderNav() {
        if (currentUser) {
            ui.navAuth.innerHTML = `
                <button class="nav-btn" onclick="openProfile()">👤 ${currentUser.displayName}</button>
                <button class="nav-btn" onclick="logout()">Выход</button>
            `;
            document.getElementById('btnAddTrack').style.display = 'inline-block';
        } else {
            ui.navAuth.innerHTML = `<button class="nav-btn primary" onclick="openAuth()">Войти</button>`;
            document.getElementById('btnAddTrack').style.display = 'none';
        }
    }

    function renderTracks() {
        let tracks = isFavMode ? allTracks.filter(t => favorites.includes(t.id)) : allTracks;
        
        if (tracks.length === 0) {
            ui.trackList.innerHTML = `<div style="text-align:center; padding:40px; color:var(--text-sec)">
                ${isFavMode ? 'Список избранного пуст' : 'Треков пока нет. Добавьте первый!'}
            </div>`;
            return;
        }

        ui.trackList.innerHTML = tracks.map(t => {
            const isOwner = currentUser && t.uid === currentUser.uid;
            const isLiked = favorites.includes(t.id);
            const playingClass = player.currentId === t.id ? 'playing' : '';
            
            return `
            <div class="track-card ${playingClass}" onclick="player.play('${t.id}')">
                <div class="cover">
                    ${t.cover ? `<img src="${t.cover}" onerror="this.src='https://via.placeholder.com/50'">` : '🎵'}
                </div>
                <div class="info">
                    <div class="t-name">${escapeHtml(t.name)}</div>
                    <div class="t-artist">${escapeHtml(t.artist)}</div>
                </div>
                <div class="actions">
                    <button class="icon-btn ${isLiked ? 'active' : ''}" onclick="event.stopPropagation(); toggleFav('${t.id}')">♥</button>
                    ${isOwner ? `
                        <button class="icon-btn edit" onclick="event.stopPropagation(); openEditTrack('${t.id}')">✎</button>
                        <button class="icon-btn" style="color:var(--danger)" onclick="event.stopPropagation(); deleteTrack('${t.id}')">🗑</button>
                    ` : ''}
                </div>
            </div>`;
        }).join('');
    }

    // --- MODALS & UTILS ---
    window.openAuth = () => ui.modals.auth.classList.add('open');
    window.openAddModal = () => {
        document.getElementById('trackForm').reset();
        document.getElementById('trackId').value = '';
        document.getElementById('trackModalTitle').innerText = 'Добавить трек';
        ui.modals.track.classList.add('open');
    };
    window.openEditTrack = (id) => {
        const t = allTracks.find(x => x.id === id);
        if (!t) return;
        document.getElementById('trackId').value = t.id;
        document.getElementById('tName').value = t.name;
        document.getElementById('tArtist').value = t.artist;
        document.getElementById('tUrl').value = t.url;
        document.getElementById('tCover').value = t.cover || '';
        document.getElementById('trackModalTitle').innerText = 'Редактировать трек';
        ui.modals.track.classList.add('open');
    };
    window.closeModals = () => Object.values(ui.modals).forEach(m => m.classList.remove('open'));

    function showToast(msg, err) {
        ui.toast.innerText = msg;
        ui.toast.style.borderLeftColor = err ? 'var(--danger)' : 'var(--accent)';
        ui.toast.classList.add('show');
        setTimeout(() => ui.toast.classList.remove('show'), 3000);
    }

    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;' }[m]));
    }

    // Expose functions to window
    window.app = { 
        renderTracks, toggleFavoritesMode, openAddModal, closeModals, 
        toggleAuthMode, handleAuth, logout, openProfile, handleProfileUpdate 
    };

    // --- PLAYER LOGIC ---
    const audio = document.getElementById('audioEl');
    const player = {
        currentId: null,
        isPlaying: false,
        
        play: (id) => {
            const track = allTracks.find(t => t.id === id);
            if (!track) return;

            // Link fixer logic
            let url = track.url;
            if (url.includes('drive.google.com')) {
                const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
                if(match) url = `https://drive.google.com/uc?export=download&id=${match[1]}`;
            } else if (url.includes('dropbox.com')) {
                url = url.replace('dl=0', 'raw=1').replace('www.dropbox.com', 'dl.dropboxusercontent.com');
            }

            if (player.currentId === id) {
                player.togglePlay();
            } else {
                player.currentId = id;
                audio.src = url;
                audio.play().then(() => {
                    player.isPlaying = true;
                    player.updateUI(track);
                    renderTracks(); // Update active state
                }).catch(e => {
                    console.error(e);
                    showToast('Ошибка воспроизведения. Проверьте ссылку.', true);
                });
            }
        },
        
        togglePlay: () => {
            if (!player.currentId) return;
            if (audio.paused) {
                audio.play();
                player.isPlaying = true;
            } else {
                audio.pause();
                player.isPlaying = false;
            }
            player.updatePlayBtn();
        },

        next: () => {
            const idx = allTracks.findIndex(t => t.id === player.currentId);
            if (idx > -1 && idx < allTracks.length - 1) player.play(allTracks[idx + 1].id);
        },
        
        prev: () => {
            const idx = allTracks.findIndex(t => t.id === player.currentId);
            if (idx > 0) player.play(allTracks[idx - 1].id);
        },

        seek: (e) => {
            const rect = e.currentTarget.getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            audio.currentTime = pct * audio.duration;
        },

        updateUI: (track) => {
            ui.playerBar.classList.add('visible');
            document.getElementById('pName').innerText = track.name;
            document.getElementById('pArtist').innerText = track.artist;
            document.getElementById('pCover').innerHTML = track.cover ? `<img src="${track.cover}">` : '🎵';
            player.updatePlayBtn();
        },

        updatePlayBtn: () => {
            document.getElementById('pBtn').innerText = player.isPlaying ? '⏸' : '▶';
        }
    };
    
    // Audio Events
    audio.addEventListener('timeupdate', () => {
        const pct = (audio.currentTime / audio.duration) * 100;
        document.getElementById('pFill').style.width = `${pct}%`;
        document.getElementById('pCurTime').innerText = formatTime(audio.currentTime);
        document.getElementById('pDurTime').innerText = formatTime(audio.duration);
    });
    
    audio.addEventListener('ended', () => player.next());

    function formatTime(s) {
        if(isNaN(s)) return "0:00";
        const m = Math.floor(s / 60);
        const sec = Math.floor(s % 60);
        return `${m}:${sec < 10 ? '0'+sec : sec}`;
    }

    window.player = player;

    // Event Listeners for Forms
    document.getElementById('authForm').addEventListener('submit', window.handleAuth);
    document.getElementById('trackForm').addEventListener('submit', window.handleTrackSubmit);
    document.getElementById('profileForm').addEventListener('submit', window.handleProfileUpdate);

</script>
</body>
</html>
